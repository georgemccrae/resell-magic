<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Magic Price Finder</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lato:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #f7f5f0;
      color: #1a1a1a;
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 70px 20px;
    }

    h1 {
      font-family: 'Cinzel', serif;
      font-size: 2rem;
      letter-spacing: 0.08em;
      color: #1a1a1a;
      margin-bottom: 12px;
      text-align: center;
    }

    .desc {
      max-width: 480px;
      text-align: center;
      font-size: 0.95rem;
      color: #666;
      line-height: 1.7;
      margin-bottom: 40px;
    }

    .desc strong {
      color: #1a1a1a;
      font-weight: 400;
    }

    .search-wrap {
      width: 100%;
      max-width: 500px;
      display: flex;
      gap: 10px;
      margin-bottom: 40px;
    }

    input {
      flex: 1;
      padding: 14px 18px;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 4px;
      color: #1a1a1a;
      font-family: 'Lato', sans-serif;
      font-size: 1rem;
      font-weight: 300;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: #1a1a1a; }
    input::placeholder { color: #aaa; }

    button {
      padding: 14px 22px;
      background: #1a1a1a;
      border: none;
      border-radius: 4px;
      color: #fff;
      font-family: 'Cinzel', serif;
      font-size: 0.82rem;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover { background: #333; }

    #status {
      font-size: 0.75rem;
      color: #aaa;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 20px;
      min-height: 18px;
    }

    #error {
      font-size: 0.82rem;
      color: #c0392b;
      background: #fdecea;
      border: 1px solid #f5c6c2;
      border-radius: 4px;
      padding: 12px 16px;
      max-width: 500px;
      width: 100%;
      margin-bottom: 20px;
      display: none;
      white-space: pre-wrap;
      font-family: monospace;
    }

    #results {
      width: 100%;
      max-width: 500px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .card {
      background: #fff;
      border: 1px solid #e8e8e8;
      border-left: 3px solid #1a1a1a;
      padding: 16px 20px;
      border-radius: 4px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      text-decoration: none;
      color: inherit;
      opacity: 0;
      transform: translateY(5px);
      animation: fadeUp 0.2s forwards;
      transition: background 0.15s;
    }

    .card:hover { background: #fafafa; }

    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

    .card-name { font-size: 0.9rem; color: #1a1a1a; margin-bottom: 3px; }
    .card-shop { font-size: 0.75rem; color: #aaa; }

    .card-price {
      font-family: 'Cinzel', serif;
      font-size: 1.05rem;
      color: #1a1a1a;
      white-space: nowrap;
    }

    .empty { color: #aaa; font-size: 0.9rem; text-align: center; margin-top: 20px; }

    .spinner {
      width: 20px; height: 20px;
      border: 2px solid #ddd;
      border-top-color: #1a1a1a;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 30px auto;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <h1>Magic Price Finder</h1>

  <p class="desc">
    Search for any magic trick or effect by name.<br/>
    We find <strong>new and second hand prices</strong> from across the web,
    so you know what to pay before you buy or sell.
  </p>

  <div class="search-wrap">
    <input type="text" id="q" placeholder="e.g. Svengali Deck" autocomplete="off"
      onkeydown="if(event.key==='Enter') doSearch()"/>
    <button onclick="doSearch()">Search</button>
  </div>

  <div id="status"></div>
  <div id="error"></div>
  <div id="results"></div>

  <script>
    async function doSearch() {
      const q = document.getElementById('q').value.trim();
      if (!q) return;

      const status = document.getElementById('status');
      const error = document.getElementById('error');
      const results = document.getElementById('results');

      status.textContent = 'Searching…';
      error.style.display = 'none';
      results.innerHTML = '<div class="spinner"></div>';

      try {
        const res = await fetch(`/search?q=${encodeURIComponent(q)}`);
        const data = await res.json();

        // Show any debug error from the server
        if (data.error) {
          error.style.display = 'block';
          error.textContent = 'Server error:\n' + data.error;
          results.innerHTML = '';
          status.textContent = '';
          return;
        }

        const items = Array.isArray(data) ? data : [];
        status.textContent = items.length ? `${items.length} results found` : '';

        if (!items.length) {
          results.innerHTML = '<p class="empty">No priced results found. Try another search.</p>';
          return;
        }

        results.innerHTML = items.map((item, i) => `
          <a class="card" href="${item.url}" target="_blank" rel="noopener"
            style="animation-delay:${i * 0.04}s">
            <div>
              <div class="card-name">${item.name}</div>
              <div class="card-shop">${item.shop}</div>
            </div>
            <div class="card-price">${item.price}</div>
          </a>
        `).join('');

      } catch(err) {
        error.style.display = 'block';
        error.textContent = 'Request failed:\n' + err.message;
        results.innerHTML = '';
        status.textContent = '';
      }
    }
  </script>

</body>
</html>
